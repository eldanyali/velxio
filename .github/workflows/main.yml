
name: Build Velxio

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install

      - name: Build project
        run: |
          npm run build

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          if [ -d dist ]; then cp -r dist/* artifact/; fi
          if [ -d build ]; then cp -r build/* artifact/; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: velxio-build
          path: artifact
